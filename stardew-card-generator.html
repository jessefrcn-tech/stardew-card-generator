<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星露谷物语 物品标签生成器</title>

<!-- Zpix 像素中文字体 -->
<style>
@font-face {
  font-family: 'zpix';
  src: url('https://cdn.jsdelivr.net/gh/SolidZORO/zpix-pixel-font@master/dist/zpix.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/SolidZORO/zpix-pixel-font@master/dist/zpix.ttf') format('truetype');
  font-display: swap;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ============ RESET & BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1c0e06;
  background-image:radial-gradient(ellipse at 40% 20%, #2a1508 0%, #1c0e06 65%);
  min-height:100vh;
  font-family:'zpix','Noto Sans SC',sans-serif;
  color:#f0d8b0;
  display:flex;flex-direction:column;align-items:center;
}

/* ============ TITLE ============ */
.app-title{
  padding:24px 20px 6px;
  font-family:'zpix',sans-serif;
  font-size:20px;
  color:#f0c040;
  text-shadow:2px 2px 0 #4b2412,4px 4px 0 rgba(0,0,0,0.4);
  letter-spacing:4px;text-align:center;
}
.app-sub{font-size:11px;color:#9a6830;text-align:center;margin-bottom:18px;letter-spacing:3px}

/* ============ LAYOUT ============ */
.app-layout{
  display:flex;gap:24px;padding:0 20px 28px;
  width:100%;max-width:1060px;align-items:flex-start;
}

/* ============ EDITOR PANEL ============ */
.editor-panel{
  flex:1;min-width:0;
  background:rgba(0,0,0,0.38);
  border:2px solid #4b2412;
  padding:18px;
  max-height:calc(100vh - 110px);
  overflow-y:auto;
}
.editor-panel::-webkit-scrollbar{width:5px}
.editor-panel::-webkit-scrollbar-track{background:#1c0e06}
.editor-panel::-webkit-scrollbar-thumb{background:#4b2412}

.sec-title{
  font-family:'zpix',sans-serif;
  font-size:13px;color:#f0c040;
  border-bottom:1px solid #4b2412;
  padding-bottom:7px;margin-bottom:13px;letter-spacing:2px;
}

.form-group{margin-bottom:12px}
.form-group label{
  display:block;font-size:11px;color:#c09050;
  margin-bottom:4px;font-weight:700;letter-spacing:1px;
}
.form-group input[type=text],
.form-group input[type=number],
.form-group textarea,
.form-group select{
  width:100%;background:#120800;
  border:2px solid #4b2412;color:#f0d8b0;
  padding:7px 10px;font-size:13px;
  font-family:'zpix','Noto Sans SC',sans-serif;
  outline:none;transition:border-color 0.15s;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus{border-color:#e6a15c}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.6}

.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1;margin-bottom:0}

/* Category colors */
.color-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.c-swatch{
  width:22px;height:22px;border:2px solid transparent;cursor:pointer;flex-shrink:0;
}
.c-swatch:hover,.c-swatch.active{border-color:#f0c040;outline:1px solid #f0c040}
.c-custom{width:22px;height:22px;border:2px solid #4b2412;cursor:pointer;padding:0;background:none}

/* Buttons */
.btn{
  padding:6px 12px;border:2px solid;cursor:pointer;
  font-family:'zpix','Noto Sans SC',sans-serif;
  font-size:11px;font-weight:700;
  transition:all 0.1s;letter-spacing:1px;
}
.btn:active{transform:translate(1px,1px)}
.btn-add{background:#0f2a0f;border-color:#2a7a2a;color:#60ee60}
.btn-add:hover{background:#1a3a1a}
.btn-remove{
  background:#2a0f0f;border-color:#7a2a2a;color:#ee6060;
  padding:3px 7px;font-size:10px;
}
.btn-remove:hover{background:#3a1a1a}
.btn-down{
  background:#2a1500;border-color:#e6a15c;color:#f0c040;
  font-size:13px;padding:11px 20px;
  width:100%;margin-top:16px;
  font-family:'zpix',sans-serif;
  letter-spacing:3px;
}
.btn-down:hover{background:#3a2000}
.btn-down:disabled{opacity:0.5;cursor:not-allowed}

/* Effects */
.effects-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.effect-row{
  background:rgba(0,0,0,0.22);
  border:1px solid #3a1e08;
  padding:10px;margin-bottom:8px;
}
.effect-row-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
}
.effect-row-num{font-size:10px;color:#806040;letter-spacing:1px}
.drag-handle{
  cursor:grab;color:#a07840;font-size:14px;
  padding:1px 5px 1px 2px;user-select:none;line-height:1;
  flex-shrink:0;
}
.drag-handle:active{cursor:grabbing}
.effect-row.dragging{opacity:0.3;border-style:dashed}
.effect-row.drag-over{border-color:#f0c040;border-width:2px}

.icon-area{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.cur-icon{
  width:40px;height:40px;border:2px solid #4b2412;
  background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;image-rendering:pixelated;overflow:hidden;
}
.cur-icon img{width:36px;height:36px;image-rendering:pixelated;object-fit:contain}

.icon-grid{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.icon-opt{
  width:34px;height:34px;border:2px solid #3a1e08;
  background:rgba(0,0,0,0.3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  image-rendering:pixelated;transition:border-color 0.1s;flex-shrink:0;
}
.icon-opt:hover{border-color:#e6a15c}
.icon-opt.selected{border-color:#f0c040;background:rgba(240,192,64,0.12)}
.icon-opt img{width:28px;height:28px;image-rendering:pixelated;object-fit:contain}
.icon-opt-up{border-style:dashed;color:#7a5030;font-size:20px;line-height:1}

.val-row{display:flex;gap:6px;align-items:flex-end}
.val-row .form-group{margin-bottom:0}
.val-row .form-group:first-child{flex:0 0 90px}
.val-row .form-group:nth-child(2){flex:1}

.color-btns{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.vcbtn{
  padding:3px 7px;border:2px solid;cursor:pointer;
  font-size:10px;font-weight:700;opacity:0.45;
  background:transparent;font-family:'zpix','Noto Sans SC',sans-serif;
}
.vcbtn.active{opacity:1}

/* ============ PREVIEW PANEL ============ */
.preview-panel{
  display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0;
}
.preview-label{
  font-size:11px;color:#9a6830;letter-spacing:3px;
  font-family:'zpix',sans-serif;
}

/* ============ STARDEW CARD ============ */
#card-capture{
  display:inline-block;
  background:#1c0e06;
  padding:12px;
}

.sdv-card{
  width:340px;
  background:#F5C782;
  font-family:'zpix','Noto Sans SC',sans-serif;
  position:relative;
  /* 双层像素边框 */
  border:4px solid #ED9741;
  box-shadow:
    inset 0 0 0 2px #F8D490,
    0 0 0 4px #9E5621;
  image-rendering:pixelated;
}

/* 像素四角 */
.sdv-card::before{
  content:'';position:absolute;inset:-8px;
  background:
    linear-gradient(#9E5621,#9E5621) 0 0/8px 8px no-repeat,
    linear-gradient(#9E5621,#9E5621) 100% 0/8px 8px no-repeat,
    linear-gradient(#9E5621,#9E5621) 0 100%/8px 8px no-repeat,
    linear-gradient(#9E5621,#9E5621) 100% 100%/8px 8px no-repeat;
  pointer-events:none;z-index:5;
}

/* 名称区 */
.sdv-name-section{
  padding:14px 16px 10px;
  background:#F8D490;
  position:relative;
}
/* 分割线：e6a15c + 下深 */
.sdv-name-section::after{
  content:'';position:absolute;
  bottom:-6px;left:0;right:0;height:6px;
  background:linear-gradient(#ED9741,#9E5621 80%);
}

.sdv-item-name{
  font-size:24px;font-weight:700;
  color:#3a1b0d;line-height:1.2;
  margin-bottom:3px;
  letter-spacing:1px;
}
.sdv-item-category{
  font-size:15px;font-weight:700;
  line-height:1.2;letter-spacing:1px;
  color:#b53d1d; /* 铁锈红 default */
}

/* 正文区 */
.sdv-body{padding:18px 16px 16px}

.sdv-desc{
  font-size:13px;font-weight:500;
  color:#3a1b0d;line-height:1.7;
  margin-bottom:14px;letter-spacing:0.3px;
}
.sdv-desc:empty{display:none}

.sdv-effects{margin-bottom:4px}
.sdv-effect-row{
  display:flex;align-items:center;
  gap:10px;margin-bottom:10px;
}
.sdv-effect-icon{
  width:38px;height:38px;flex-shrink:0;image-rendering:pixelated;
}
.sdv-effect-icon img{
  width:38px;height:38px;image-rendering:pixelated;display:block;object-fit:contain;
  filter:drop-shadow(-2px 2px 0px rgba(0,0,0,0.45));
}
.sdv-effect-text{
  font-size:18px;font-weight:700;
  color:#3a1b0d;line-height:1;letter-spacing:0.5px;
}

/* 分割线 */
.sdv-divider{
  height:3px;
  background:linear-gradient(to right, #9E5621, #ED9741 40%, #ED9741 60%, #9E5621);
  margin:6px 0 12px;opacity:0.6;
}

/* 价格行 */
.sdv-price-row{display:flex;align-items:center;gap:8px}
.sdv-price-val{font-size:21px;font-weight:700;color:#3a1b0d;line-height:1}
.sdv-price-icon{width:26px;height:26px;image-rendering:pixelated;flex-shrink:0}
.sdv-price-icon img{width:26px;height:26px;image-rendering:pixelated;display:block}

/* 低分辨率高斯模糊 — 仅作用于文字节点，不影响图标 */
.sdv-item-name,
.sdv-item-category,
.sdv-desc,
.sdv-effect-text,
.sdv-price-val{
  filter:blur(0.4px);
}

/* hidden */
#icon-upload-input{display:none}
</style>
</head>
<body>

<div class="app-title">星 露 谷 物 语  物 品 标 签 生 成 器</div>
<div class="app-sub">· Stardew Valley Item Card Generator ·</div>

<div class="app-layout">

<!-- ======= LEFT: EDITOR ======= -->
<div class="editor-panel">

  <div class="sec-title">基本信息</div>

  <div class="form-group">
    <label>物品名称</label>
    <input type="text" id="inp-name" placeholder="例：喜糖" oninput="updateCard()">
  </div>

  <div class="form-group">
    <label>种类</label>
    <input type="text" id="inp-category" placeholder="例：菜品" oninput="updateCard()">
    <div class="color-row" id="cat-colors"></div>
  </div>

  <div class="form-group">
    <label>物品简介</label>
    <textarea id="inp-desc" placeholder="描述文本…" oninput="updateCard()"></textarea>
  </div>

  <div class="sec-title" style="margin-top:18px">效果列表</div>

  <div class="effects-header">
    <span style="font-size:10px;color:#806040;letter-spacing:1px">可上传自定义图标</span>
    <button class="btn btn-add" onclick="addEffect()">＋ 添加效果</button>
  </div>
  <div id="effects-list"></div>

  <div class="sec-title" style="margin-top:18px">价格 & 外观</div>

  <div class="form-row">
    <div class="form-group">
      <label>金额</label>
      <input type="number" id="inp-price" placeholder="0" min="0" oninput="updateCard()">
    </div>
    <div class="form-group" style="flex:0 0 auto;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:2px">
      <label>
        <input type="checkbox" id="chk-price" checked onchange="updateCard()">
        &nbsp;显示价格
      </label>
    </div>
  </div>

  <div class="form-group">
    <label>背景色调</label>
    <select id="sel-bg" onchange="updateCard()">
      <option value="warm">暖黄（菜品/食物）</option>
      <option value="cool">浅金（古物/装备）</option>
      <option value="pale">米白（矿石/工具）</option>
    </select>
  </div>

  <button class="btn btn-down" id="btn-down" onclick="downloadPNG()">⬇  下 载  P N G</button>
  <div style="font-size:10px;color:#604020;text-align:center;margin-top:8px;letter-spacing:1px">以 2× 分辨率导出 · 建议使用 Chrome</div>
</div>

<!-- ======= RIGHT: PREVIEW ======= -->
<div class="preview-panel">
  <div class="preview-label">实 时 预 览</div>

  <div id="card-capture">
    <div class="sdv-card" id="sdv-card">

      <div class="sdv-name-section">
        <div class="sdv-item-name" id="card-name">物品名称</div>
        <div class="sdv-item-category" id="card-category">种类</div>
      </div>

      <div class="sdv-body">
        <div class="sdv-desc" id="card-desc"></div>
        <div class="sdv-effects" id="card-effects"></div>
        <div class="sdv-divider" id="card-divider"></div>
        <div class="sdv-price-row" id="card-price-row">
          <div class="sdv-price-val" id="card-price-val">0</div>
          <div class="sdv-price-icon">
            <img id="card-coin-img" src="" alt="G">
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

</div><!-- end layout -->

<input type="file" id="icon-upload-input" accept="image/*">

function pngDataURL(b64){ return 'data:image/png;base64,'+b64; }
function iconSrc(key){ return pngDataURL(LOCAL_ICONS[key].b64); }

// ============================================================
// CATEGORY COLORS
// ============================================================
const CAT_COLORS = [
  '#b53d1d','#e07010','#c8a000','#2a8a2a',
  '#1a60cc','#8b2d8b','#cc1a60','#2a8a8a','#3a1b0d',
];

// ============================================================
// VALUE TEXT COLORS
// ============================================================
const VAL_COLORS = [
  {key:'neutral',  color:'#3a1b0d', label:'默认'},
  {key:'positive', color:'#1a6b1a', label:'正面'},
  {key:'negative', color:'#aa1010', label:'负面'},
  {key:'special',  color:'#7020a0', label:'特殊'},
];

// ============================================================
// CARD BG VARIANTS
// ============================================================
const BG_VARIANTS = {
  warm: { card:'#F5C782', top:'#F8D490' },
  cool: { card:'#f5d580', top:'#f8e098' },
  pale: { card:'#f2e4b8', top:'#f8eecc' },
};

// ============================================================
// STATE
// ============================================================
let catColor = '#b53d1d';
let effectIdCounter = 0;
let effects = [];
let uploadCallbackId = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', ()=>{
  buildCatColorPicker();
  // coin icon
  document.getElementById('card-coin-img').src = pngDataURL(COIN_B64);
  // default values
  document.getElementById('inp-name').value = '物品名称';
  document.getElementById('inp-category').value = '菜品';
  document.getElementById('inp-desc').value = '充满爱意的糖果，据说吃下后会让人出幸福的微笑。';
  document.getElementById('inp-price').value = '520';
  addEffect('energy', '+200', '能量', 'neutral');
  addEffect('health', '+100', '生命值', 'neutral');
  addEffect('luck', '+99', '运气', 'special');
  updateCard();
});

function buildCatColorPicker(){
  const row = document.getElementById('cat-colors');
  CAT_COLORS.forEach(c=>{
    const sw = document.createElement('div');
    sw.className='c-swatch'+(c===catColor?' active':'');
    sw.style.background=c;
    sw.onclick=()=>{
      catColor=c;
      row.querySelectorAll('.c-swatch').forEach(x=>x.classList.remove('active'));
      sw.classList.add('active');
      updateCard();
    };
    row.appendChild(sw);
  });
  const ci = document.createElement('input');
  ci.type='color'; ci.className='c-custom'; ci.value='#b53d1d'; ci.title='自定义颜色';
  ci.oninput=()=>{ catColor=ci.value; row.querySelectorAll('.c-swatch').forEach(x=>x.classList.remove('active')); updateCard(); };
  row.appendChild(ci);
}

// ============================================================
// EFFECTS
// ============================================================
function getEffect(id){ return effects.find(e=>e.id===id); }

function addEffect(iconKey='energy', value='+', unit='', colorKey='neutral'){
  const id = ++effectIdCounter;
  effects.push({id, iconKey, customSrc:null, value, unit, colorKey});
  renderEffectRow(id);
  updateCard();
}

function removeEffect(id){
  effects = effects.filter(e=>e.id!==id);
  const el = document.getElementById('erow-'+id);
  if(el) el.remove();
  updateCard();
}

function renderEffectRow(id){
  const ef = getEffect(id);
  const wrap = document.createElement('div');
  wrap.className='effect-row'; wrap.id='erow-'+id;

  // icon options
  let iconHtml = '';
  Object.entries(LOCAL_ICONS).forEach(([k,v])=>{
    const sel = ef.iconKey===k ? ' selected' : '';
    iconHtml += `<div class="icon-opt${sel}" onclick="selectIcon(${id},'${k}')" title="${v.name}">
      <img src="${pngDataURL(v.b64)}" alt="${v.name}">
    </div>`;
  });
  iconHtml += `<div class="icon-opt icon-opt-up" onclick="triggerUpload(${id})" title="上传自定义图标">+</div>`;

  const curSrc = ef.customSrc || iconSrc(ef.iconKey);

  let colorHtml = '';
  VAL_COLORS.forEach(vc=>{
    const act = ef.colorKey===vc.key?' active':'';
    colorHtml += `<button class="vcbtn${act}" style="color:${vc.color};border-color:${vc.color}" onclick="setEffectColor(${id},'${vc.key}')">${vc.label}</button>`;
  });

  const idx = effects.findIndex(e=>e.id===id)+1;
  wrap.innerHTML=`
    <div class="effect-row-header">
      <div style="display:flex;align-items:center;gap:4px">
        <span class="drag-handle" title="拖动排序">⠿⠿</span>
        <span class="effect-row-num">效果 #${idx}</span>
      </div>
      <button class="btn btn-remove" onclick="removeEffect(${id})">✕ 删除</button>
    </div>
    <div class="icon-area">
      <div class="cur-icon" id="ci-${id}"><img src="${curSrc}" id="ci-img-${id}" alt="icon"></div>
      <div class="icon-grid" id="ig-${id}">${iconHtml}</div>
    </div>
    <div class="val-row">
      <div class="form-group">
        <label>数值</label>
        <input type="text" value="${ef.value}" placeholder="+100" oninput="setEffectField(${id},'value',this.value)">
      </div>
      <div class="form-group">
        <label>单位</label>
        <input type="text" value="${ef.unit}" placeholder="能量" oninput="setEffectField(${id},'unit',this.value)">
      </div>
    </div>
    <div class="color-btns" id="cbtn-${id}">${colorHtml}</div>
  `;
  document.getElementById('effects-list').appendChild(wrap);
  initDrag(wrap, id);
}

// ============================================================
// DRAG & DROP REORDER
// ============================================================
let dragSrcId = null;

function initDrag(wrap, id){
  const handle = wrap.querySelector('.drag-handle');
  // 只有按下手柄才启用拖拽，防止操作输入框时意外触发
  handle.addEventListener('mousedown', ()=>{ wrap.draggable = true; });
  handle.addEventListener('mouseup',   ()=>{ wrap.draggable = false; });

  wrap.addEventListener('dragstart', e=>{
    if(!wrap.draggable){ e.preventDefault(); return; }
    dragSrcId = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(()=>wrap.classList.add('dragging'), 0);
  });
  wrap.addEventListener('dragend', ()=>{
    wrap.draggable = false;
    wrap.classList.remove('dragging');
    syncEffectsOrder();
    updateNumbering();
    updateCard();
  });
  wrap.addEventListener('dragover', e=>{
    e.preventDefault();
    if(dragSrcId === id) return;
    const dragEl = document.getElementById('erow-'+dragSrcId);
    if(!dragEl) return;
    const rect = wrap.getBoundingClientRect();
    if(e.clientY < rect.top + rect.height / 2){
      wrap.parentNode.insertBefore(dragEl, wrap);
    } else {
      wrap.after(dragEl);
    }
  });
}

function syncEffectsOrder(){
  const rows = document.getElementById('effects-list').querySelectorAll('.effect-row');
  const ordered = [];
  rows.forEach(row=>{
    const rid = parseInt(row.id.replace('erow-',''));
    const ef = effects.find(e=>e.id===rid);
    if(ef) ordered.push(ef);
  });
  effects = ordered;
}

function updateNumbering(){
  effects.forEach((ef,i)=>{
    const el = document.querySelector('#erow-'+ef.id+' .effect-row-num');
    if(el) el.textContent = '效果 #'+(i+1);
  });
}

function selectIcon(id, key){
  const ef = getEffect(id); if(!ef) return;
  ef.iconKey=key; ef.customSrc=null;
  const img = document.getElementById('ci-img-'+id);
  if(img) img.src = iconSrc(key);
  const grid = document.getElementById('ig-'+id);
  if(grid){
    const opts = grid.querySelectorAll('.icon-opt:not(.icon-opt-up)');
    const keys = Object.keys(LOCAL_ICONS);
    opts.forEach((o,i)=>o.classList.toggle('selected', keys[i]===key));
  }
  updateCard();
}

function triggerUpload(id){ uploadCallbackId=id; document.getElementById('icon-upload-input').click(); }

document.getElementById('icon-upload-input').addEventListener('change',function(){
  if(!this.files[0]||!uploadCallbackId) return;
  const id = uploadCallbackId;
  const ef = getEffect(id); if(!ef) return;
  const reader = new FileReader();
  reader.onload=e=>{
    ef.customSrc = e.target.result;
    const img = document.getElementById('ci-img-'+id);
    if(img) img.src = e.target.result;
    const grid = document.getElementById('ig-'+id);
    if(grid) grid.querySelectorAll('.icon-opt').forEach(o=>o.classList.remove('selected'));
    updateCard();
  };
  reader.readAsDataURL(this.files[0]);
  this.value='';
});

function setEffectField(id, field, val){
  const ef = getEffect(id); if(ef) ef[field]=val; updateCard();
}

function setEffectColor(id, colorKey){
  const ef = getEffect(id); if(!ef) return;
  ef.colorKey=colorKey;
  const btns = document.querySelectorAll(`#cbtn-${id} .vcbtn`);
  btns.forEach((b,i)=>b.classList.toggle('active', VAL_COLORS[i].key===colorKey));
  updateCard();
}

// UPDATE CARD

function updateCard(){
  const name    = document.getElementById('inp-name').value    || '物品名称';
  const cat     = document.getElementById('inp-category').value|| '种类';
  const desc    = document.getElementById('inp-desc').value    || '';
  const price   = document.getElementById('inp-price').value   || '0';
  const showP   = document.getElementById('chk-price').checked;
  const bgKey   = document.getElementById('sel-bg').value;
  const bg      = BG_VARIANTS[bgKey] || BG_VARIANTS.warm;

  const card = document.getElementById('sdv-card');
  card.style.background = bg.card;
  document.querySelector('.sdv-name-section').style.background = bg.top;

  document.getElementById('card-name').textContent = name;
  const catEl = document.getElementById('card-category');
  catEl.textContent = cat;
  catEl.style.color = catColor;
  document.getElementById('card-desc').textContent = desc;

  // Effects
  const efContainer = document.getElementById('card-effects');
  efContainer.innerHTML = '';
  effects.forEach(ef=>{
    const row = document.createElement('div');
    row.className='sdv-effect-row';

    const iconWrap = document.createElement('div');
    iconWrap.className='sdv-effect-icon';
    const img = document.createElement('img');
    img.src = ef.customSrc || iconSrc(ef.iconKey);
    img.alt = ef.iconKey;
    iconWrap.appendChild(img);

    const txt = document.createElement('div');
    txt.className='sdv-effect-text';
    const vc = VAL_COLORS.find(v=>v.key===ef.colorKey)||VAL_COLORS[0];
    txt.style.color = vc.color;
    txt.textContent = (ef.value||'') + (ef.unit ? ' '+ef.unit : '');

    row.appendChild(iconWrap);
    row.appendChild(txt);
    efContainer.appendChild(row);
  });

  // Price
  const divider  = document.getElementById('card-divider');
  const priceRow = document.getElementById('card-price-row');
  if(showP){
    divider.style.display='block';
    priceRow.style.display='flex';
    document.getElementById('card-price-val').textContent = price;
  } else {
    divider.style.display='none';
    priceRow.style.display='none';
  }
}

// ============================================================
// DOWNLOAD
// ============================================================
async function downloadPNG(){
  const btn = document.getElementById('btn-down');
  btn.textContent='生 成 中 …'; btn.disabled=true;
  try{
    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,300));
    const target = document.getElementById('card-capture');
    const canvas = await html2canvas(target,{
      scale:2, backgroundColor:'#1c0e06',
      useCORS:true, allowTaint:true, logging:false,
      onclone: (doc) => {
        // html2canvas does not support CSS filter — substitute equivalents
        // text blur: filter:blur → text-shadow
        doc.querySelectorAll('.sdv-item-name,.sdv-item-category,.sdv-desc,.sdv-effect-text,.sdv-price-val')
          .forEach(el => { el.style.filter='none'; el.style.textShadow='0 0 1px rgba(58,27,13,0.4)'; });
        // icon drop-shadow: filter:drop-shadow → box-shadow on wrapper
        doc.querySelectorAll('.sdv-effect-icon img')
          .forEach(img => { img.style.filter='none'; img.parentElement.style.boxShadow='-2px 2px 0 rgba(0,0,0,0.45)'; });
      }
    });
    const link = document.createElement('a');
    const nm = (document.getElementById('inp-name').value||'item').replace(/\s+/g,'_');
    link.download = `星露谷_${nm}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(e){
    alert('导出失败，请刷新后重试。\n'+e.message);
  }finally{
    btn.textContent='⬇  下 载  P N G'; btn.disabled=false;
  }
}
